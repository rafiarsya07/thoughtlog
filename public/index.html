        <button type="button" class="tb" title="Link (Ctrl+K)" onclick="fmt('link')">${ICONS.link}</button>
        <button type="button" class="tb" title="Quote" onclick="fmt('quote')">&ldquo;&rdquo;</button>
        <button type="button" class="tb" title="Inline code" onclick="fmt('code')">&lt;/&gt;</button>
        <button type="button" class="tb" title="Code block" onclick="fmt('codeblock')">{ }</button>
        <button type="button" class="tb" title="Bulleted list" onclick="fmt('ul')">&bull; &mdash;</button>
        <span class="tb-sep"></span>
        <button type="button" onclick="document.getElementById('inlineImgInput').click()">${ICONS.image} Insert image</button>
        <input type="file" id="inlineImgInput" accept="image/png,image/jpeg,image/webp,image/gif"/>
      </div>
      <div class="editor-grid">
        <textarea id="body" placeholder="## A heading&#10;&#10;Write your thoughts. **Bold**, lists, > quotes and \`code\` all work.&#10;&#10;Try a callout:&#10;> [!tip] This becomes a styled box.&#10;&#10;Or a footnote like this.[^1]&#10;&#10;[^1]: Defined at the bottom.">${esc(post.body)}</textarea>
        <div class="preview-pane"><div class="preview-label">Live preview</div><div id="preview" class="post-body"></div></div>
      </div>
      <div class="editor-meta">
        <div class="counts"><span id="wcWords">0 words</span><span id="wcChars">0 chars</span><span id="wcRead">~0 min read</span></div>
        <span class="autosave" id="autosaveStatus"></span>
      </div>
      <div class="schedule-box">
        <label>Schedule (optional) — set a future date to auto-publish</label>
        <input id="schedat" type="datetime-local" value="${schedDefault}" style="margin-bottom:0"/>
      </div>
      <div class="btn-group">
        <button class="btn" id="publishBtn" onclick="savePost(${editId||0},'publish')">${editId?"Publish":"Publish now"}</button>
        <button class="btn amber" id="scheduleBtn" onclick="savePost(${editId||0},'schedule')">Schedule</button>
        <button class="btn ghost" id="draftBtn" onclick="savePost(${editId||0},'draft')">Save draft</button>
      </div>
    </div>`;
  renderCoverArea();
  const bodyEl=document.getElementById("body"),prev=document.getElementById("preview");
  const titleEl=document.getElementById("title"),tagsEl=document.getElementById("tags");
  let t;

  // --- live preview: render server-side (so callouts/footnotes match), then
  //     run the same client enhancements readers get (highlight + copy + lightbox)
  async function updatePreview(){
    try{
      const r=await api("/admin/preview",{method:"POST",body:JSON.stringify({body:bodyEl.value})});
      prev.innerHTML=r.html||'<span style="color:var(--faint)">nothing yet…</span>';
      if(r.html)enhancePostBody(prev);
    }catch{}
  }

  // --- word / character count + reading-time estimate (200 wpm) ---
  function updateCounts(){
    const text=bodyEl.value.trim();
    const words=text?text.split(/\s+/).length:0;
    const chars=bodyEl.value.length;
    const mins=Math.max(1,Math.round(words/200));
    document.getElementById("wcWords").textContent=`${words.toLocaleString()} word${words===1?"":"s"}`;
    document.getElementById("wcChars").textContent=`${chars.toLocaleString()} chars`;
    document.getElementById("wcRead").textContent=`~${mins} min read`;
  }

  // --- autosave to localStorage (per draft key), debounced. This is a local
  //     safety net for unsaved work — separate from the server "Save draft".
  const draftKey="tl_draft_"+(editId||"new");
  const statusEl=document.getElementById("autosaveStatus");
  let autosaveTimer;
  function snapshot(){return JSON.stringify({title:titleEl.value,tags:tagsEl.value,body:bodyEl.value,cover:pendingCoverUrl,at:Date.now()})}
  function doAutosave(){
    try{
      localStorage.setItem(draftKey,snapshot());
      statusEl.className="autosave saved";
      statusEl.innerHTML=`<span class="dot"></span>Saved locally · ${new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}`;
    }catch{}
  }
  function scheduleAutosave(){
    statusEl.className="autosave";
    statusEl.innerHTML=`<span class="dot"></span>Editing…`;
    clearTimeout(autosaveTimer);
    autosaveTimer=setTimeout(doAutosave,1200);
  }
  window.__clearDraft=()=>{try{localStorage.removeItem(draftKey)}catch{}};

  // --- offer to restore a newer local draft if one exists and differs ---
  (function offerRestore(){
    let saved;try{saved=JSON.parse(localStorage.getItem(draftKey)||"null")}catch{saved=null}
    if(!saved)return;
    const sameAsLoaded=saved.title===titleEl.value&&saved.body===bodyEl.value&&saved.tags===tagsEl.value;
    if(sameAsLoaded){return}
    const when=saved.at?new Date(saved.at).toLocaleString([],{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):"earlier";
    document.getElementById("restoreSlot").innerHTML=`
      <div class="restore-banner">
        <span>Found an unsaved local draft from ${when}.</span>
        <div class="ra">
          <button id="restoreYes">Restore it</button>
          <button class="dismiss" id="restoreNo">Discard</button>
        </div>
      </div>`;
    document.getElementById("restoreYes").onclick=()=>{
      titleEl.value=saved.title||"";tagsEl.value=saved.tags||"";bodyEl.value=saved.body||"";
      if(saved.cover){pendingCoverUrl=saved.cover;renderCoverArea()}
      document.getElementById("restoreSlot").innerHTML="";
      updatePreview();updateCounts();showToast("Local draft restored");
    };
    document.getElementById("restoreNo").onclick=()=>{
      window.__clearDraft();document.getElementById("restoreSlot").innerHTML="";
    };
  })();

  bodyEl.oninput=()=>{clearTimeout(t);t=setTimeout(updatePreview,300);updateCounts();scheduleAutosave()};
  titleEl.oninput=scheduleAutosave;
  tagsEl.oninput=scheduleAutosave;
  updatePreview();
  updateCounts();

  // --- formatting helpers (toolbar + keyboard shortcuts) ---
  window.fmt=(kind)=>applyFormat(bodyEl,kind,updatePreview,updateCounts,scheduleAutosave);
  bodyEl.addEventListener("keydown",(e)=>{
    if(!(e.ctrlKey||e.metaKey))return;
    const k=e.key.toLowerCase();
    if(k==="b"){e.preventDefault();window.fmt("bold")}
    else if(k==="i"){e.preventDefault();window.fmt("italic")}
    else if(k==="k"){e.preventDefault();window.fmt("link")}
  });

  document.getElementById("inlineImgInput").onchange=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    const placeholder=`![uploading ${file.name}…]()`;
    const start=bodyEl.selectionStart,end=bodyEl.selectionEnd;
    bodyEl.value=bodyEl.value.slice(0,start)+placeholder+bodyEl.value.slice(end);
    try{
      const url=await uploadFile(file);
      bodyEl.value=bodyEl.value.replace(placeholder,`![${file.name.replace(/\.[^.]+$/,"")}](${url})`);
      showToast("Image inserted");
    }catch(err){
      bodyEl.value=bodyEl.value.replace(placeholder,"");
      showToast(err.error||"Upload failed",true);
    }
    updatePreview();
    e.target.value="";
  };
}

function renderCoverArea(){
  const el=document.getElementById("coverArea");
  if(pendingCoverUrl){
    el.innerHTML=`<div class="cover-preview-wrap"><img src="${esc(pendingCoverUrl)}" alt=""/><button type="button" class="cover-remove" onclick="removeCover()" title="Remove cover image">✕</button></div>`;
  }else{
    el.innerHTML=`
      <label class="cover-drop" id="coverDrop">
        <input type="file" id="coverInput" accept="image/png,image/jpeg,image/webp,image/gif"/>
        <div class="hint">${ICONS.image}<br/><b>Click to upload</b> or drag an image here<br/>JPEG, PNG, WEBP or GIF · up to 5MB</div>
        <div class="upload-progress" id="coverProgress"><div class="bar" id="coverBar"></div></div>
      </label>`;
    const drop=document.getElementById("coverDrop"),input=document.getElementById("coverInput");
    input.onchange=async(e)=>{const f=e.target.files[0];if(f)await handleCoverFile(f)};
    ["dragenter","dragover"].forEach(evt=>drop.addEventListener(evt,(e)=>{e.preventDefault();drop.classList.add("dragover")}));
    ["dragleave","drop"].forEach(evt=>drop.addEventListener(evt,(e)=>{e.preventDefault();drop.classList.remove("dragover")}));
    drop.addEventListener("drop",async(e)=>{const f=e.dataTransfer.files[0];if(f)await handleCoverFile(f)});
  }
}
function removeCover(){pendingCoverUrl="";renderCoverArea()}
async function handleCoverFile(file){
  if(!file.type.startsWith("image/")){showToast("Please choose an image file",true);return}
  if(file.size>5*1024*1024){showToast("Image is larger than 5MB",true);return}
  const bar=document.getElementById("coverBar"),wrap=document.getElementById("coverProgress");
  wrap?.classList.add("show");
  try{
    const url=await uploadFile(file,(pct)=>{if(bar)bar.style.width=pct+"%"});
    pendingCoverUrl=url;
    renderCoverArea();
    showToast("Cover image uploaded");
  }catch(err){
    showToast(err.error||"Upload failed",true);
    wrap?.classList.remove("show");
  }
}

function uploadFile(file,onProgress){
  return new Promise((resolve,reject)=>{
    const fd=new FormData();fd.append("file",file);
    const xhr=new XMLHttpRequest();
    xhr.open("POST","/api/admin/upload");
    xhr.upload.onprogress=(e)=>{if(e.lengthComputable&&onProgress)onProgress(Math.round(e.loaded/e.total*100))};
    xhr.onload=()=>{
      let data;try{data=JSON.parse(xhr.responseText)}catch{data={}}
      if(xhr.status>=200&&xhr.status<300&&data.url)resolve(data.url);
      else reject(data.error?data:{error:"Upload failed"});
    };
    xhr.onerror=()=>reject({error:"Network error during upload"});
    xhr.send(fd);
  });
}

async function savePost(editId,action){
  const err=document.getElementById("err");err.innerHTML="";
  const title=document.getElementById("title").value;
  const body=document.getElementById("body").value;
  if(!title.trim()||!body.trim()){err.innerHTML=errorBlock("Title and body can't be empty.");return}
  const payload={title,tags:document.getElementById("tags").value,body,coverImage:pendingCoverUrl,action};
  if(action==="schedule"){
    const s=document.getElementById("schedat").value;
    if(!s){err.innerHTML=errorBlock("Pick a date/time to schedule.");return}
    payload.publishAt=new Date(s).toISOString();
  }
  const btnId=action==="publish"?"publishBtn":action==="schedule"?"scheduleBtn":"draftBtn";
  const btn=document.getElementById(btnId);
  const allBtns=["publishBtn","scheduleBtn","draftBtn"].map(id=>document.getElementById(id));
  allBtns.forEach(b=>b.disabled=true);
  const original=btn.innerHTML;
  btn.innerHTML=`<span class="spin"></span> Saving…`;
  try{
    if(editId)await api("/admin/posts/"+editId,{method:"PUT",body:JSON.stringify(payload)});
    else await api("/admin/posts",{method:"POST",body:JSON.stringify(payload)});
    if(window.__clearDraft)window.__clearDraft();
    showToast(action==="draft"?"Draft saved":action==="schedule"?"Post scheduled":"Published");
    go("/admin");
  }catch(e){
    err.innerHTML=errorBlock(e.error||"Could not save this post.");
    allBtns.forEach(b=>b.disabled=false);
    btn.innerHTML=original;
  }
}

/* ─────────────────────────────────────────────────────────────
   READING MODE
   A floating control available on article pages. Reader can set
   font size (S/M/L), column width (narrow/normal/wide), typeface
   (serif/sans) and theme (light/dark). Persisted in localStorage
   and applied via CSS variables + data-attributes on <body>.
   ───────────────────────────────────────────────────────────── */
const READER_DEFAULTS={fs:"m",width:"normal",font:"serif"};
const FS_MAP={s:0.9,m:1,l:1.15};
const WIDTH_MAP={narrow:"620px",normal:"760px",wide:"900px"};
function getReaderPrefs(){
  try{return {...READER_DEFAULTS,...JSON.parse(localStorage.getItem("tl_reader")||"{}")}}
  catch{return {...READER_DEFAULTS}}
}
function saveReaderPrefs(p){localStorage.setItem("tl_reader",JSON.stringify(p))}
function applyReaderPrefs(){
  const p=getReaderPrefs();
  document.documentElement.style.setProperty("--reader-fs",FS_MAP[p.fs]??1);
  document.documentElement.style.setProperty("--reader-measure",WIDTH_MAP[p.width]??"760px");
  document.body.setAttribute("data-reader-font",p.font);
  // reflect active states in panel if it's open
  document.querySelectorAll("[data-rp]").forEach(b=>{
    const [k,v]=b.dataset.rp.split(":");
    b.classList.toggle("on", String(p[k])===v || (k==="theme"&&getTheme()===v));
  });
}
function setReaderPref(key,val){
  if(key==="theme"){ if(getTheme()!==val) toggleTheme(); applyReaderPrefs(); return; }
  const p=getReaderPrefs(); p[key]=val; saveReaderPrefs(p); applyReaderPrefs();
}
function resetReaderPrefs(){ saveReaderPrefs({...READER_DEFAULTS}); applyReaderPrefs(); }
function unmountReader(){
  document.body.removeAttribute("data-reader-on");
  document.getElementById("readerFab")?.remove();
  document.getElementById("readerPanel")?.remove();
  app.classList.remove("reader-scope");
}
function mountReader(){
  if(document.getElementById("readerFab"))return;
  document.body.setAttribute("data-reader-on","1");
  app.classList.add("reader-scope");
  const fab=document.createElement("button");
  fab.id="readerFab";fab.className="reader-fab";fab.title="Reading settings";
  fab.setAttribute("aria-label","Reading settings");
  fab.innerHTML=ICONS.reader;
  const panel=document.createElement("div");
  panel.id="readerPanel";panel.className="reader-panel";
  panel.innerHTML=`
    <div class="rp-head">
      <span class="rp-title">Reading</span>
      <button class="rp-close" id="rpClose" aria-label="Close">${ICONS.close}</button>
    </div>
    <div class="rp-group">
      <div class="rp-label">${ICONS.textSize} Text size</div>
      <div class="rp-seg">
        <button data-rp="fs:s"><span class="a">A</span></button>
        <button data-rp="fs:m"><span class="b">A</span></button>
        <button data-rp="fs:l"><span class="c">A</span></button>
      </div>
    </div>
    <div class="rp-group">
      <div class="rp-label">${ICONS.width} Column width</div>
      <div class="rp-seg">
        <button data-rp="width:narrow">Narrow</button>
        <button data-rp="width:normal">Normal</button>
        <button data-rp="width:wide">Wide</button>
      </div>
    </div>
    <div class="rp-group">
      <div class="rp-label">${ICONS.reader} Typeface</div>
      <div class="rp-seg">
        <button data-rp="font:serif" style="font-family:'Newsreader',serif">Serif</button>
        <button data-rp="font:sans" style="font-family:'Inter',sans-serif">Sans</button>
      </div>
    </div>
    <div class="rp-group">
      <div class="rp-label">${ICONS.moon} Theme</div>
      <div class="rp-seg">
        <button data-rp="theme:light">Light</button>
        <button data-rp="theme:dark">Dark</button>
      </div>
    </div>
    <button class="rp-reset" id="rpReset">Reset to defaults</button>`;
  document.body.appendChild(fab);
  document.body.appendChild(panel);
  fab.addEventListener("click",()=>panel.classList.toggle("open"));
  panel.querySelector("#rpClose").addEventListener("click",()=>panel.classList.remove("open"));
  panel.querySelector("#rpReset").addEventListener("click",resetReaderPrefs);
  panel.querySelectorAll("[data-rp]").forEach(btn=>{
    btn.addEventListener("click",()=>{const [k,v]=btn.dataset.rp.split(":");setReaderPref(k,v)});
  });
  document.addEventListener("click",(e)=>{
    if(!panel.contains(e.target)&&!fab.contains(e.target))panel.classList.remove("open");
  });
  applyReaderPrefs();
}

function route(){
  unmountReader();
  const path=location.pathname,params=new URLSearchParams(location.search);
  if(path==="/")return viewList(params.get("q"));
  if(path.startsWith("/p/"))return viewPost(decodeURIComponent(path.slice(3)));
  if(path.startsWith("/tag/"))return viewTag(decodeURIComponent(path.slice(5)));
  if(path==="/login")return viewLogin();
  if(path==="/admin")return viewAdmin();
  if(path==="/write")return viewEditor(null);
  if(path.startsWith("/edit/"))return viewEditor(Number(path.slice(6)));
  app.innerHTML=`<div class="empty"><div class="empty-icon">?</div>page not found<button class="btn ghost small" onclick="go('/')">Back home</button></div>`;
}
(async function(){applyReaderPrefs();await refreshMe();route()})();
</script>
