<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ThoughtLog — Rafi Arsya</title>
<meta name="description" content="Notes on what I build and why — by Rafi Arsya." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<!-- highlight.js for code syntax highlighting; styled monochrome below to fit the theme -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
<style>
  :root {
    --bg:#fbfaf7; --bg-raised:#fff; --ink:#1c1d1a; --ink-soft:#55564f; --faint:#92938a;
    --line:#e6e4d9; --line-soft:#efeee5; --accent:#1d4d44; --accent-bright:#246b5d;
    --accent-soft:#e8efec; --paper:#fff; --danger:#a13a26; --danger-soft:#fbece7;
    --amber:#9a6a00; --amber-soft:#fdf3df; --radius:6px; --radius-lg:10px;
    --shadow-sm:0 1px 2px rgba(28,29,26,.04), 0 1px 1px rgba(28,29,26,.03);
    --shadow-md:0 4px 16px rgba(28,29,26,.06), 0 1px 2px rgba(28,29,26,.04);
    --shadow-lg:0 16px 48px rgba(28,29,26,.10), 0 2px 6px rgba(28,29,26,.05);
    --ease:cubic-bezier(.16,1,.3,1);
  }
  html[data-theme="dark"] {
    --bg:#15161a; --bg-raised:#1c1e23; --ink:#e8e6e0; --ink-soft:#b0aea6; --faint:#6e6d68;
    --line:#2c2e34; --line-soft:#24262b; --accent:#5fae9b; --accent-bright:#7cc4b1;
    --accent-soft:#1d2d29; --paper:#1c1e23; --danger:#e2725a; --danger-soft:#2e1d18;
    --amber:#d9a440; --amber-soft:#2c2415;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3), 0 1px 1px rgba(0,0,0,.2);
    --shadow-md:0 4px 16px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
    --shadow-lg:0 16px 48px rgba(0,0,0,.5), 0 2px 6px rgba(0,0,0,.3);
  }
  html, body { transition: background-color .25s var(--ease); }
  *{box-sizing:border-box;margin:0;padding:0}
  /* Safety net: any inline icon SVG defaults to a sane size unless a scope overrides it.
     Without this, icons with no width/height attr render at their intrinsic/huge size. */
  svg{width:18px;height:18px;flex-shrink:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);color:var(--ink);font-family:"Newsreader",Georgia,serif;
    font-size:19px;line-height:1.6;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 1px 1px, rgba(28,29,26,.025) 1px, transparent 0);
    background-size:28px 28px;
  }
  html[data-theme="dark"] body{background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,.025) 1px, transparent 0);}
  a{color:inherit}
  .mono{font-family:"JetBrains Mono",monospace}
  .wrap{max-width:760px;margin:0 auto;padding:0 24px}
  ::selection{background:var(--accent);color:#fff}

  button:focus-visible,input:focus-visible,textarea:focus-visible,a:focus-visible{
    outline:2px solid var(--accent);outline-offset:2px;border-radius:2px;
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  header.site{
    position:sticky;top:0;z-index:40;background:rgba(251,250,247,.88);
    backdrop-filter:blur(10px) saturate(1.1);
    border-bottom:1px solid var(--line);padding:22px 0;
  }
  .site-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand-group{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .brand{font-family:"Fraunces",serif;font-weight:600;font-size:24px;letter-spacing:-.01em;cursor:pointer;background:none;border:none;color:var(--ink);transition:opacity .2s var(--ease)}
  .brand:hover{opacity:.7}
  .brand .dot{color:var(--accent)}
  .tagline{font-size:12.5px;color:var(--faint);font-family:"JetBrains Mono",monospace;white-space:nowrap}
  .nav{display:flex;gap:4px;align-items:center}
  .nav button{
    background:none;border:none;cursor:pointer;font-family:"JetBrains Mono",monospace;
    font-size:11.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);
    padding:7px 12px;border-radius:20px;transition:all .18s var(--ease);
  }
  .nav button:hover{color:var(--accent);background:var(--accent-soft)}
  .nav button.primary{background:var(--ink);color:#fff}
  .nav button.primary:hover{background:var(--accent);color:#fff}

  main.wrap{padding-top:40px;padding-bottom:24px;min-height:60vh}

  .search-row{margin-bottom:28px;position:relative}
  .search-row input[type=text]{
    display:block;width:100%;padding:13px 16px 13px 46px;border:1px solid var(--line);border-radius:var(--radius-lg);
    background:var(--paper);font-family:"JetBrains Mono",monospace;font-size:13.5px;color:var(--ink);
    box-shadow:var(--shadow-sm);margin-bottom:0;transition:border-color .18s var(--ease), box-shadow .18s var(--ease);
  }
  .search-row input::placeholder{color:var(--faint)}
  .search-row input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .search-icon{position:absolute;left:15px;top:13px;color:var(--faint);pointer-events:none;display:flex;align-items:center;justify-content:center;width:16px;height:16px;line-height:0}
  .search-icon svg{width:16px;height:16px;display:block}
  .search-spinner{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:14px;height:14px;display:none}
  .search-spinner.show{display:block}
  .search-spinner svg{width:14px;height:14px;animation:spin 0.7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .tagcloud{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px}
  .tagcloud button{
    font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--accent);background:var(--accent-soft);
    border:1px solid transparent;border-radius:20px;padding:5px 13px;cursor:pointer;
    transition:all .18s var(--ease);
  }
  .tagcloud button:hover{background:var(--accent);color:#fff;transform:translateY(-1px);box-shadow:var(--shadow-sm)}

  .post-card{
    padding:28px 0;border-bottom:1px solid var(--line);cursor:pointer;
    transition:padding-left .22s var(--ease);position:relative;
  }
  .post-card:hover{padding-left:6px}
  .post-card:hover .post-title{color:var(--accent)}
  .post-card::before{
    content:"";position:absolute;left:-24px;top:0;bottom:0;width:3px;background:var(--accent);
    transform:scaleY(0);transition:transform .22s var(--ease);transform-origin:top;
  }
  .post-card:hover::before{transform:scaleY(1)}
  .post-meta{
    font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--faint);text-transform:uppercase;
    letter-spacing:.06em;margin-bottom:9px;display:flex;gap:13px;flex-wrap:wrap;align-items:center;
  }
  .post-meta .dot-sep::before{content:"·";margin-right:13px;color:var(--line)}
  .post-title{font-family:"Fraunces",serif;font-weight:600;font-size:25px;line-height:1.25;letter-spacing:-.015em;transition:color .18s var(--ease)}
  .post-excerpt{color:var(--ink-soft);margin-top:9px;font-size:16.5px;line-height:1.55}
  .tag{color:var(--accent)}
  .badge{font-size:10px;padding:3px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
  .badge.draft{background:var(--line-soft);color:var(--faint)}
  .badge.scheduled{background:var(--amber-soft);color:var(--amber)}
  .badge.published{background:var(--accent-soft);color:var(--accent)}

  article.post{animation:fadeUp .4s var(--ease)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  article.post .post-title{font-size:max(30px, min(42px, 8vw));margin-bottom:16px;line-height:1.1}
  article.post .post-meta{margin-bottom:32px}
  .cover{width:100%;display:block;border-radius:var(--radius-lg);margin-bottom:32px;border:1px solid var(--line);box-shadow:var(--shadow-md)}
  .post-body{font-size:19.5px;line-height:1.75}
  .post-body h2{font-family:"Fraunces",serif;font-size:27px;font-weight:600;margin:40px 0 14px;letter-spacing:-.01em}
  .post-body h3{font-family:"Fraunces",serif;font-size:21px;font-weight:600;margin:30px 0 10px}
  .post-body p{margin:0 0 21px}
  .post-body ul,.post-body ol{margin:0 0 21px 26px}
  .post-body li{margin-bottom:9px}
  .post-body strong{font-weight:600}
  .post-body img{max-width:100%;border-radius:var(--radius);margin:8px 0;display:block}
  .post-body a{color:var(--accent);text-decoration:underline;text-decoration-color:var(--accent-soft);text-decoration-thickness:2px;transition:text-decoration-color .15s}
  .post-body a:hover{text-decoration-color:var(--accent)}
  .post-body blockquote{border-left:3px solid var(--accent);padding:4px 0 4px 22px;margin:0 0 21px;color:var(--ink-soft);font-style:italic}
  .post-body code{font-family:"JetBrains Mono",monospace;font-size:.83em;background:var(--accent-soft);padding:2px 7px;border-radius:4px;color:var(--accent)}
  .post-body pre{background:#1c1d1a;color:#e8e6dd;padding:20px 22px;border-radius:var(--radius-lg);overflow-x:auto;margin:0 0 26px;box-shadow:var(--shadow-md)}
  .post-body pre code{background:none;color:inherit;padding:0;font-size:13.5px}
  .back-link{
    display:inline-flex;align-items:center;gap:6px;font-family:"JetBrains Mono",monospace;font-size:12px;
    color:var(--faint);text-transform:uppercase;letter-spacing:.07em;background:none;border:none;
    cursor:pointer;margin-bottom:30px;padding:0;transition:color .18s var(--ease);
  }
  .back-link:hover{color:var(--accent)}
  .back-link svg{width:13px;height:13px;transition:transform .18s var(--ease)}
  .back-link:hover svg{transform:translateX(-3px)}
  .related{margin-top:52px;padding-top:30px;border-top:1px solid var(--line)}
  .related h3{font-family:"JetBrains Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:18px}
  .related-item{cursor:pointer;padding:12px 0;font-family:"Fraunces",serif;font-weight:500;font-size:18px;border-bottom:1px solid var(--line-soft);transition:color .18s var(--ease),padding-left .18s var(--ease)}
  .related-item:last-child{border-bottom:none}
  .related-item:hover{color:var(--accent);padding-left:6px}

  .panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:30px;margin-bottom:24px;box-shadow:var(--shadow-sm)}
  .panel h2{font-family:"Fraunces",serif;font-size:22px;font-weight:600;margin-bottom:20px}
  label{display:block;font-family:"JetBrains Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:7px}
  input[type=text],input[type=password],input[type=datetime-local],textarea{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:var(--radius);
    font-family:"JetBrains Mono",monospace;font-size:14px;background:var(--bg);color:var(--ink);
    margin-bottom:20px;transition:border-color .18s var(--ease), box-shadow .18s var(--ease);
  }
  textarea{min-height:360px;line-height:1.65;resize:vertical;font-family:"JetBrains Mono",monospace}
  input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  .cover-drop{
    border:1.5px dashed var(--line);border-radius:var(--radius-lg);padding:22px 20px;margin-bottom:20px;
    background:var(--bg);transition:all .18s var(--ease);cursor:pointer;text-align:center;position:relative;
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .cover-drop:hover,.cover-drop.dragover{border-color:var(--accent);background:var(--accent-soft)}
  .cover-drop input[type=file]{display:none}
  .cover-drop .hint{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--faint);line-height:1.6}
  .cover-drop .hint b{color:var(--accent);font-weight:600}
  .cover-drop .hint svg{width:28px;height:28px;color:var(--faint);margin-bottom:4px;opacity:.7}
  .cover-preview-wrap{position:relative;margin-bottom:20px}
  .cover-preview-wrap img{width:100%;border-radius:var(--radius-lg);display:block;border:1px solid var(--line);max-height:280px;object-fit:cover}
  .cover-remove{
    position:absolute;top:10px;right:10px;background:rgba(28,29,26,.75);color:#fff;border:none;
    border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:background .15s;
  }
  .cover-remove:hover{background:var(--danger)}
  .upload-progress{height:3px;background:var(--line-soft);border-radius:3px;overflow:hidden;margin-top:10px;display:none}
  .upload-progress.show{display:block}
  .upload-progress .bar{height:100%;background:var(--accent);width:0%;transition:width .15s linear}

  .editor-toolbar{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .editor-toolbar button{
    font-family:"JetBrains Mono",monospace;font-size:11px;padding:6px 11px;border-radius:5px;
    border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);cursor:pointer;
    transition:all .15s var(--ease);display:inline-flex;align-items:center;gap:5px;
  }
  .editor-toolbar button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .editor-toolbar button svg{width:13px;height:13px}
  .editor-toolbar input[type=file]{display:none}

  .editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .preview-pane{
    border:1px dashed var(--line);border-radius:var(--radius);padding:18px;background:var(--bg);
    min-height:340px;overflow-y:auto;max-height:520px;
  }
  .preview-pane .preview-label{font-family:"JetBrains Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:12px}

  .btn{
    font-family:"JetBrains Mono",monospace;font-size:13px;padding:11px 20px;border-radius:var(--radius);
    cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;letter-spacing:.02em;
    transition:all .18s var(--ease);display:inline-flex;align-items:center;gap:7px;
  }
  .btn:hover{background:var(--accent-bright);border-color:var(--accent-bright);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
  .btn.ghost{background:none;color:var(--accent)}
  .btn.ghost:hover{background:var(--accent-soft)}
  .btn.danger{background:none;border-color:var(--danger);color:var(--danger)}
  .btn.danger:hover{background:var(--danger);color:#fff}
  .btn.amber{background:none;border-color:var(--amber);color:var(--amber)}
  .btn.amber:hover{background:var(--amber);color:#fff}
  .btn.small{padding:7px 13px;font-size:11.5px}
  .btn-group{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  .spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

  .stats-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:24px}
  .stat{
    background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px 20px;
    flex:1;min-width:110px;box-shadow:var(--shadow-sm);transition:box-shadow .2s var(--ease);
  }
  .stat:hover{box-shadow:var(--shadow-md)}
  .stat .num{font-family:"Fraunces",serif;font-size:30px;font-weight:600;color:var(--accent)}
  .stat .lbl{font-family:"JetBrains Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-top:5px}
  .admin-post-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 0;border-bottom:1px solid var(--line);transition:background .15s}
  .admin-post-row:hover{background:var(--bg)}
  .admin-post-row .t{font-family:"Fraunces",serif;font-weight:500;font-size:17px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .admin-post-row .s{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--faint);margin-top:3px}

  .empty{text-align:center;color:var(--faint);padding:64px 20px;font-family:"JetBrains Mono",monospace;font-size:13px}
  .empty .empty-icon{font-size:28px;margin-bottom:14px;opacity:.5}
  .empty .empty-detail{margin-top:8px;font-size:11.5px;color:var(--faint);opacity:.8}
  .empty .btn{margin-top:18px}

  .skeleton{display:flex;flex-direction:column;gap:0}
  .skel-card{padding:28px 0;border-bottom:1px solid var(--line)}
  .skel-line{background:linear-gradient(90deg,var(--line-soft) 25%,var(--line) 50%,var(--line-soft) 75%);background-size:200% 100%;animation:shimmer 1.4s ease infinite;border-radius:4px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .skel-card .skel-line.meta{height:11px;width:140px;margin-bottom:12px}
  .skel-card .skel-line.title{height:22px;width:78%;margin-bottom:10px}
  .skel-card .skel-line.excerpt{height:14px;width:94%}

  .error{
    color:var(--danger);font-family:"JetBrains Mono",monospace;font-size:13px;margin-bottom:16px;
    background:var(--danger-soft);border:1px solid #f0d2c6;border-radius:var(--radius);padding:11px 14px;
    display:flex;align-items:flex-start;gap:9px;line-height:1.5;
  }
  .error svg{width:15px;height:15px;flex-shrink:0;margin-top:2px}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);
    color:#fff;font-family:"JetBrains Mono",monospace;font-size:12.5px;padding:12px 20px;border-radius:30px;
    box-shadow:var(--shadow-lg);z-index:100;opacity:0;transition:all .25s var(--ease);pointer-events:none;
    display:flex;align-items:center;gap:8px;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.error-toast{background:var(--danger)}

  .schedule-box{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:20px}

  /* ---------- reading progress bar ---------- */
  .progress-bar{position:fixed;top:0;left:0;height:2.5px;background:var(--accent);z-index:60;width:0%;transition:width .1s linear}

  /* ---------- theme toggle ---------- */
  .theme-toggle{
    background:none;border:1px solid var(--line);cursor:pointer;width:34px;height:34px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:all .18s var(--ease);
  }
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .theme-toggle svg{width:16px;height:16px}

  /* ---------- table of contents ---------- */
  .toc{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:32px}
  .toc summary{font-family:"JetBrains Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);cursor:pointer;user-select:none}
  .toc ol{list-style:none;margin-top:14px;counter-reset:toc}
  .toc li{counter-increment:toc;margin-bottom:8px;font-size:15px}
  .toc li::before{content:counter(toc) ".";font-family:"JetBrains Mono",monospace;color:var(--accent);margin-right:8px;font-size:12px}
  .toc li.lvl3{margin-left:20px}
  .toc a{color:var(--ink-soft);text-decoration:none;transition:color .15s}
  .toc a:hover{color:var(--accent)}

  /* ---------- share buttons ---------- */
  .share-row{display:flex;gap:10px;align-items:center;margin:32px 0;flex-wrap:wrap}
  .share-row .lbl{font-family:"JetBrains Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint)}
  .share-btn{
    width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--paper);
    display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);
    transition:all .18s var(--ease);
  }
  .share-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);transform:translateY(-2px)}
  .share-btn svg{width:16px;height:16px}

  /* ---------- reactions ---------- */
  .reactions-row{display:flex;gap:8px;flex-wrap:wrap;margin:36px 0;padding:20px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .reaction-btn{
    font-family:"JetBrains Mono",monospace;font-size:13px;padding:8px 14px;border-radius:20px;
    border:1.5px solid var(--line);background:var(--paper);cursor:pointer;display:inline-flex;align-items:center;gap:7px;
    transition:border-color .18s var(--ease),background .18s var(--ease),color .18s var(--ease),transform .18s var(--ease),box-shadow .18s var(--ease);
    position:relative;
  }
  .reaction-btn:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
  .reaction-btn:active{transform:translateY(0) scale(.94)}
  .reaction-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .reaction-btn .emoji{font-size:16px;display:inline-block;transition:transform .18s var(--ease)}
  .reaction-btn .count{font-weight:600;min-width:10px;text-align:center;font-variant-numeric:tabular-nums}
  .reaction-btn:hover .emoji{transform:scale(1.18) rotate(-6deg)}
  /* the satisfying pop when you click/toggle a reaction on */
  .reaction-btn.pop .emoji{animation:reactPop .42s var(--ease)}
  @keyframes reactPop{
    0%{transform:scale(1)}
    35%{transform:scale(1.5) rotate(8deg)}
    60%{transform:scale(.88) rotate(-5deg)}
    100%{transform:scale(1) rotate(0)}
  }
  /* a single emoji that floats up and fades, Facebook-style, on activate */
  .react-float{
    position:absolute;left:50%;top:-2px;transform:translateX(-50%);
    font-size:20px;pointer-events:none;z-index:5;will-change:transform,opacity;
    animation:reactFloat .9s var(--ease) forwards;
  }
  @keyframes reactFloat{
    0%{opacity:0;transform:translate(-50%,4px) scale(.6)}
    20%{opacity:1;transform:translate(-50%,-10px) scale(1.15)}
    100%{opacity:0;transform:translate(-50%,-46px) scale(1)}
  }
  /* faint ring burst behind the button when activated */
  .react-ring{
    position:absolute;inset:0;border-radius:20px;border:2px solid var(--accent);
    pointer-events:none;opacity:.7;animation:reactRing .5s var(--ease) forwards;
  }
  @keyframes reactRing{0%{transform:scale(1);opacity:.55}100%{transform:scale(1.35);opacity:0}}
  @media(prefers-reduced-motion:reduce){
    .reaction-btn.pop .emoji{animation:none}
    .react-float,.react-ring{display:none}
  }

  /* ---------- rating ---------- */
  .rating-display{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .rating-stars{display:inline-flex;gap:2px}
  .rating-stars .star{font-size:15px;color:var(--line)}
  .rating-stars .star.filled{color:var(--amber)}
  .rating-input{display:inline-flex;flex-direction:row-reverse;gap:4px}
  .rating-input .star{font-size:22px;color:var(--line);transition:color .12s;cursor:pointer}
  .rating-input .star.filled{color:var(--amber)}
  .rating-input .star:hover,.rating-input .star:hover ~ .star{color:var(--amber)}

  /* ---------- comments ---------- */
  .comments-section{margin-top:48px;padding-top:32px;border-top:1px solid var(--line)}
  .comments-section h3{font-family:"Fraunces",serif;font-size:22px;font-weight:600;margin-bottom:22px;display:flex;align-items:center;gap:10px}
  .comments-section h3 .count-badge{font-family:"JetBrains Mono",monospace;font-size:12px;background:var(--accent-soft);color:var(--accent);padding:3px 10px;border-radius:12px}
  .comment-form{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius-lg);padding:22px;margin-bottom:28px}
  .comment-form .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .comment-form textarea{min-height:90px}
  .comment-item{padding:18px 0;border-bottom:1px solid var(--line-soft)}
  .comment-item:last-child{border-bottom:none}
  .comment-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .comment-avatar{
    width:32px;height:32px;border-radius:50%;background:var(--accent-soft);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-family:"Fraunces",serif;font-weight:600;font-size:14px;flex-shrink:0;
  }
  .comment-author{font-weight:600;font-size:15px}
  .comment-date{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--faint)}
  .comment-body{color:var(--ink-soft);font-size:16px;line-height:1.55;margin-left:42px;white-space:pre-wrap;word-wrap:break-word}
  .no-comments{text-align:center;padding:32px 0;color:var(--faint);font-family:"JetBrains Mono",monospace;font-size:13px}
  /* admin badge on replies from the author */
  .comment-badge{font-family:"JetBrains Mono",monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;
    background:var(--accent);color:#fff;padding:2px 7px;border-radius:10px;line-height:1.4}
  .comment-edited{font-family:"JetBrains Mono",monospace;font-size:9.5px;color:var(--faint);font-style:italic}
  /* per-comment action links (reply / edit / delete) */
  .comment-actions{display:flex;gap:14px;margin:8px 0 0 42px}
  .comment-actions button{
    background:none;border:none;cursor:pointer;padding:0;color:var(--faint);
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.03em;transition:color .15s;
  }
  .comment-actions button:hover{color:var(--accent)}
  .comment-actions button.danger:hover{color:var(--danger)}
  /* admin reply + nested replies live indented under their parent */
  .comment-replies{margin:14px 0 0 42px;padding-left:16px;border-left:2px solid var(--line-soft)}
  .comment-replies .comment-item{padding:14px 0}
  .comment-replies .comment-body,.comment-replies .comment-actions{margin-left:34px}
  .comment-item.is-admin>.comment-body{color:var(--ink)}
  .comment-item.is-admin .comment-avatar{background:var(--accent);color:#fff}
  /* inline edit / reply boxes */
  .comment-inline-box{margin:10px 0 0 42px}
  .comment-inline-box textarea{min-height:64px;margin-bottom:8px}
  .comment-inline-box .row-btns{display:flex;gap:8px}
  .comment-inline-box .btn-sm{
    font-family:"JetBrains Mono",monospace;font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--line);
    background:var(--paper);color:var(--ink-soft);transition:all .15s;
  }
  .comment-inline-box .btn-sm.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .comment-inline-box .btn-sm:hover{border-color:var(--accent)}

  /* ---------- newsletter ---------- */
  .newsletter-box{
    background:var(--accent);color:#fff;border-radius:var(--radius-lg);padding:30px 32px;margin:40px 0;
    display:flex;align-items:center;gap:24px;flex-wrap:wrap;justify-content:space-between;
  }
  .newsletter-box .copy{flex:1;min-width:200px}
  .newsletter-box h4{font-family:"Fraunces",serif;font-size:19px;font-weight:600;margin-bottom:4px}
  .newsletter-box p{font-size:14px;opacity:.85;font-family:"JetBrains Mono",monospace}
  .newsletter-form{display:flex;gap:8px;flex-wrap:wrap}
  .newsletter-form input{
    background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:#fff;
    padding:10px 14px;border-radius:var(--radius);font-family:"JetBrains Mono",monospace;font-size:13px;
    min-width:200px;margin-bottom:0;
  }
  .newsletter-form input::placeholder{color:rgba(255,255,255,.6)}
  .newsletter-form input:focus{outline:none;box-shadow:0 0 0 2px rgba(255,255,255,.4)}
  .newsletter-form button{
    background:#fff;color:var(--accent);border:none;padding:10px 18px;border-radius:var(--radius);
    font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;
  }
  .newsletter-form button:hover{opacity:.88}
  .rss-link{display:inline-flex;align-items:center;gap:5px;color:var(--faint);transition:color .15s}
  .rss-link:hover{color:var(--amber)}
  .rss-link svg{width:13px;height:13px}

  footer.site{border-top:1px solid var(--line);margin-top:72px;padding:28px 0 52px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--faint);text-align:center;letter-spacing:.04em}
  footer.site .footer-links{display:flex;gap:16px;justify-content:center;margin-top:10px}

  @media (max-width:680px){
    .wrap{padding:0 18px}
    main.wrap{padding-top:28px}
    .tagline{display:none}
    .editor-grid{grid-template-columns:1fr}
    article.post .post-title{font-size:28px}
    .post-body{font-size:17.5px}
    .post-title{font-size:22px}
    .panel{padding:20px}
    .stat{min-width:96px;padding:14px 16px}
    .stat .num{font-size:24px}
    .nav button span.full{display:none}
    .comment-form .row2{grid-template-columns:1fr}
    .comment-body{margin-left:0;margin-top:6px}
    .comment-actions{margin-left:0}
    .comment-replies{margin-left:14px;padding-left:12px}
    .comment-inline-box{margin-left:0}
    .newsletter-box{padding:22px}
    .newsletter-form{width:100%}
    .newsletter-form input{flex:1;min-width:0}
  }

  /* ─────────────────────────────────────────────────────────────
     READING MODE — a floating control on article pages that lets a
     reader tune font size, column width, typeface and theme. All
     preferences persist in localStorage and apply via CSS variables.
     ───────────────────────────────────────────────────────────── */
  :root{
    --reader-fs:1;          /* font-size multiplier */
    --reader-measure:760px; /* article column width */
  }
  /* When reader prefs are active, the article body scales from these vars */
  article.post .post-body{
    font-size:calc(19px * var(--reader-fs));
    line-height:1.75;
  }
  body[data-reader-font="sans"] article.post .post-body{
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  body[data-reader-font="sans"] article.post .post-body h2,
  body[data-reader-font="sans"] article.post .post-body h3{
    font-family:"Inter",system-ui,sans-serif;letter-spacing:-.02em;
  }
  /* Column width is applied to the whole article wrap when reading */
  body[data-reader-on="1"] .wrap.reader-scope{max-width:var(--reader-measure);transition:max-width .25s var(--ease)}

  .reader-fab{
    position:fixed;right:20px;bottom:20px;z-index:60;
    width:48px;height:48px;border-radius:50%;border:1px solid var(--line);
    background:var(--bg-raised);color:var(--accent);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 20px rgba(0,0,0,.12);transition:transform .18s var(--ease),box-shadow .18s var(--ease);
  }
  .reader-fab svg{width:21px;height:21px}
  .reader-fab:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,.16)}
  .reader-panel{
    position:fixed;right:20px;bottom:80px;z-index:61;width:290px;
    background:var(--bg-raised);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 16px 48px rgba(0,0,0,.18);padding:18px 18px 16px;
    opacity:0;transform:translateY(10px) scale(.97);pointer-events:none;transform-origin:bottom right;
    transition:opacity .2s var(--ease),transform .2s var(--ease);
  }
  .reader-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
  .reader-panel .rp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .reader-panel .rp-title{font-family:"Fraunces",serif;font-size:17px;font-weight:600}
  .reader-panel .rp-close{background:none;border:none;cursor:pointer;color:var(--faint);display:flex;padding:4px;border-radius:6px}
  .reader-panel .rp-close:hover{background:var(--bg);color:var(--ink)}
  .rp-group{margin-bottom:16px}
  .rp-group:last-child{margin-bottom:0}
  .rp-label{display:flex;align-items:center;gap:7px;font-family:"JetBrains Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);margin-bottom:9px}
  .rp-label svg{width:13px;height:13px}
  .rp-seg{display:flex;gap:6px}
  .rp-seg button{
    flex:1;border:1px solid var(--line);background:var(--bg);color:var(--ink-soft);
    border-radius:9px;padding:9px 0;cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:12px;
    transition:all .14s var(--ease);display:flex;align-items:center;justify-content:center;
  }
  .rp-seg button:hover{border-color:var(--accent);color:var(--accent)}
  .rp-seg button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .rp-seg button .a{font-size:11px} .rp-seg button .b{font-size:15px} .rp-seg button .c{font-size:19px}
  .rp-reset{width:100%;margin-top:4px;background:none;border:none;cursor:pointer;color:var(--faint);font-family:"JetBrains Mono",monospace;font-size:11px;padding:6px;border-radius:6px;transition:color .15s}
  .rp-reset:hover{color:var(--accent)}
  @media(max-width:520px){
    .reader-panel{right:12px;left:12px;width:auto;bottom:78px}
    .reader-fab{right:14px;bottom:14px}
  }

  /* ═══════════════════════════════════════════════════════════════
     NEW FEATURES — code copy + syntax highlight, image lightbox,
     back-to-top, callouts, footnotes, editor format toolbar,
     word-count + autosave, dashboard filter + bulk actions.
     All kept monochrome to match the existing palette.
     ═══════════════════════════════════════════════════════════════ */

  /* ---------- code block: header bar with language + copy button ---------- */
  .code-wrap{position:relative;margin:0 0 26px}
  .code-wrap pre{margin:0}
  .code-head{
    display:flex;align-items:center;justify-content:space-between;
    background:#161714;border-radius:var(--radius-lg) var(--radius-lg) 0 0;
    padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.07);
  }
  .code-wrap.has-head pre{border-radius:0 0 var(--radius-lg) var(--radius-lg)}
  .code-lang{font-family:"JetBrains Mono",monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:#8a8c82}
  .code-copy{
    font-family:"JetBrains Mono",monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#cfcec4;
    padding:4px 10px;border-radius:5px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
    transition:all .15s var(--ease);
  }
  .code-copy:hover{background:rgba(255,255,255,.13);color:#fff}
  .code-copy.copied{background:var(--accent);border-color:var(--accent);color:#fff}
  .code-copy svg{width:12px;height:12px}
  /* highlight.js monochrome scheme — tones of the same ink, no rainbow */
  .hljs{color:#e8e6dd;background:transparent}
  .hljs-comment,.hljs-quote{color:#7c7e74;font-style:italic}
  .hljs-keyword,.hljs-selector-tag,.hljs-built_in,.hljs-name,.hljs-tag{color:#fff;font-weight:600}
  .hljs-string,.hljs-title,.hljs-section,.hljs-attribute,.hljs-literal,.hljs-template-tag,.hljs-template-variable,.hljs-type,.hljs-addition{color:#bfc7b4}
  .hljs-number,.hljs-symbol,.hljs-bullet,.hljs-link,.hljs-meta,.hljs-deletion{color:#a9b0c0}
  .hljs-emphasis{font-style:italic}.hljs-strong{font-weight:700}

  /* ---------- callouts (> [!note] / [!warn] / [!tip]) ---------- */
  .callout{
    border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:var(--radius);padding:14px 18px;margin:0 0 24px;background:var(--bg);
  }
  .callout .callout-head{
    display:flex;align-items:center;gap:8px;font-family:"JetBrains Mono",monospace;
    font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:6px;font-weight:500;
  }
  .callout .callout-head svg{width:14px;height:14px}
  .callout p:last-child{margin-bottom:0}
  .callout.warn{border-left-color:var(--danger)}.callout.warn .callout-head{color:var(--danger)}
  .callout.tip{border-left-color:var(--amber)}.callout.tip .callout-head{color:var(--amber)}

  /* ---------- footnotes ---------- */
  .post-body sup.fnref{font-size:.7em;line-height:0}
  .post-body sup.fnref a{color:var(--accent);text-decoration:none;padding:0 1px;font-weight:600}
  .footnotes{margin-top:48px;padding-top:22px;border-top:1px solid var(--line);font-size:15px;color:var(--ink-soft)}
  .footnotes .fn-title{font-family:"JetBrains Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:14px}
  .footnotes ol{margin-left:20px}.footnotes li{margin-bottom:8px}
  .footnotes a.fn-back{color:var(--accent);text-decoration:none;margin-left:6px}

  /* ---------- image lightbox ---------- */
  .post-body img{cursor:zoom-in}
  .lightbox{
    position:fixed;inset:0;z-index:120;background:rgba(12,12,10,.92);
    display:flex;align-items:center;justify-content:center;padding:32px;
    opacity:0;pointer-events:none;transition:opacity .22s var(--ease);
  }
  .lightbox.open{opacity:1;pointer-events:auto}
  .lightbox img{max-width:100%;max-height:100%;border-radius:var(--radius);box-shadow:0 24px 70px rgba(0,0,0,.5);transform:scale(.96);transition:transform .22s var(--ease)}
  .lightbox.open img{transform:scale(1)}
  .lightbox-close{
    position:absolute;top:20px;right:24px;width:42px;height:42px;border-radius:50%;
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background .15s;
  }
  .lightbox-close:hover{background:rgba(255,255,255,.22)}
  .lightbox-close svg{width:20px;height:20px}

  /* ---------- back-to-top ---------- */
  .to-top{
    position:fixed;left:20px;bottom:20px;z-index:55;width:44px;height:44px;border-radius:50%;
    border:1px solid var(--line);background:var(--bg-raised);color:var(--ink-soft);cursor:pointer;
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,.12);
    opacity:0;transform:translateY(12px);pointer-events:none;transition:all .22s var(--ease);
  }
  .to-top.show{opacity:1;transform:translateY(0);pointer-events:auto}
  .to-top:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .to-top svg{width:18px;height:18px}
  @media(max-width:520px){.to-top{left:14px;bottom:14px}}

  /* ---------- editor: format toolbar + word count + autosave ---------- */
  .editor-toolbar .tb-sep{width:1px;align-self:stretch;background:var(--line);margin:0 2px}
  .editor-toolbar button.tb{padding:6px 10px;min-width:32px;justify-content:center}
  .editor-toolbar button.tb b,.editor-toolbar button.tb i{font-family:Georgia,serif;font-size:13px}
  .editor-meta{
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--faint);margin:-12px 0 16px;
  }
  .editor-meta .counts{display:flex;gap:14px}
  .editor-meta .autosave{display:inline-flex;align-items:center;gap:6px;transition:color .2s}
  .editor-meta .autosave.saved{color:var(--accent)}
  .editor-meta .autosave .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7}
  .restore-banner{
    background:var(--amber-soft);border:1px solid var(--amber);color:var(--amber);border-radius:var(--radius);
    padding:11px 14px;margin-bottom:18px;font-family:"JetBrains Mono",monospace;font-size:12px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  }
  .restore-banner .ra{display:flex;gap:8px}
  .restore-banner button{font-family:"JetBrains Mono",monospace;font-size:11px;padding:5px 11px;border-radius:5px;cursor:pointer;border:1px solid var(--amber);background:none;color:var(--amber);transition:all .15s}
  .restore-banner button:hover{background:var(--amber);color:#fff}
  .restore-banner button.dismiss{border-color:transparent;color:var(--faint)}
  .restore-banner button.dismiss:hover{background:none;color:var(--ink)}

  /* ---------- dashboard: filter bar + bulk actions ---------- */
  .filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .filter-bar .seg{display:flex;gap:4px;background:var(--bg);border:1px solid var(--line);border-radius:24px;padding:3px}
  .filter-bar .seg button{
    font-family:"JetBrains Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    border:none;background:none;color:var(--ink-soft);padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .15s var(--ease);
  }
  .filter-bar .seg button:hover{color:var(--accent)}
  .filter-bar .seg button.on{background:var(--ink);color:#fff}
  .filter-bar .fsearch{flex:1;min-width:160px;position:relative}
  .filter-bar .fsearch input{
    width:100%;padding:8px 12px;border:1px solid var(--line);border-radius:20px;background:var(--bg);
    font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink);margin:0;
  }
  .filter-bar .fsearch input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .bulk-bar{
    display:none;align-items:center;gap:12px;flex-wrap:wrap;background:var(--accent-soft);
    border:1px solid var(--accent);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;
    font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--accent);
  }
  .bulk-bar.show{display:flex}
  .bulk-bar .sel-count{font-weight:600}
  .bulk-bar .spacer{flex:1}
  .admin-post-row .row-check{display:flex;align-items:center;margin-right:4px}
  .admin-post-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;margin:0}
  .admin-post-row.selected{background:var(--accent-soft)}
</style>
</head>
<body>
  <div class="progress-bar" id="progressBar"></div>
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close image"></button>
    <img id="lightboxImg" src="" alt="" />
  </div>
  <button class="to-top" id="toTop" aria-label="Back to top"></button>
  <header class="site">
    <div class="wrap site-inner">
      <div class="brand-group">
        <button class="brand" onclick="go('/')">ThoughtLog<span class="dot">.</span></button>
        <span class="tagline">notes on what I build &amp; why</span>
      </div>
      <nav class="nav" id="nav"></nav>
    </div>
  </header>
  <main class="wrap" id="app"></main>
  <footer class="site">
    <div class="wrap">

<script>
const app=document.getElementById("app"),nav=document.getElementById("nav"),toastEl=document.getElementById("toast");
let me=null;

function showToast(msg,isError){
  toastEl.textContent=msg;
  toastEl.className="toast show"+(isError?" error-toast":"");
  clearTimeout(toastEl._t);
  toastEl._t=setTimeout(()=>toastEl.classList.remove("show"),3200);
}

async function api(path,opts={},signal){
  const ctrl=new AbortController();
  const timeout=setTimeout(()=>ctrl.abort("timeout"),10000);
  const onParentAbort=()=>ctrl.abort("navigated-away");
  if(signal){
    if(signal.aborted)onParentAbort();
    else signal.addEventListener("abort",onParentAbort);
  }
  try{
    const r=await fetch("/api"+path,{headers:opts.body instanceof FormData?{}:{"Content-Type":"application/json"},...opts,signal:ctrl.signal});
    if(!r.ok){
      let payload;
      try{payload=await r.json()}catch{payload={error:`Server error (${r.status})`}}
      throw payload;
    }
    return await r.json();
  }catch(e){
    if(e?.name==="AbortError"||ctrl.signal.aborted){
      if(ctrl.signal.reason==="timeout")throw{error:"Request timed out — the server took too long to respond."};
      throw{error:"cancelled"};
    }
    throw e?.error?e:{error:"Network error — check your connection and try again."};
  }finally{
    clearTimeout(timeout);
    if(signal)signal.removeEventListener("abort",onParentAbort);
  }
}

function fmtDate(ts){return new Date(ts).toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"})}
function fmtDateTime(ts){return new Date(ts).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
// Relative time like "just now", "5m ago", "3h ago", "2d ago"; falls back to a
// full date past a week. The full timestamp goes in the title attribute.
function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<45)return"just now";
  if(s<90)return"1m ago";
  const m=Math.floor(s/60); if(m<60)return m+"m ago";
  const h=Math.floor(m/60); if(h<24)return h+"h ago";
  const d=Math.floor(h/24); if(d<7)return d+"d ago";
  return fmtDate(ts);
}
// Anonymous comment ownership: when you post a comment the server hands back a
// one-time edit token; we keep it here, keyed by comment id, so the same
// browser can later edit or delete that comment. Cleared if you clear storage.
const COMMENT_TOKENS_KEY="tl_comment_tokens";
function getCommentTokens(){try{return JSON.parse(localStorage.getItem(COMMENT_TOKENS_KEY)||"{}")}catch{return{}}}
function saveCommentToken(id,token){const t=getCommentTokens();t[id]=token;localStorage.setItem(COMMENT_TOKENS_KEY,JSON.stringify(t))}
function tokenFor(id){return getCommentTokens()[id]||null}
function dropCommentToken(id){const t=getCommentTokens();delete t[id];localStorage.setItem(COMMENT_TOKENS_KEY,JSON.stringify(t))}
function esc(s){const d=document.createElement("div");d.textContent=s==null?"":s;return d.innerHTML}

  close:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>`,
  copy:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`,
  check:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`,

  info:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>`,

// ---- dark mode: persisted in localStorage, applied before first paint of
// each view via a data-attribute on <html> so CSS variables just work. ----
function getTheme(){return localStorage.getItem("tl_theme")||"light"}
function applyTheme(t){document.documentElement.setAttribute("data-theme",t)}
function toggleTheme(){
  const next=getTheme()==="dark"?"light":"dark";
  localStorage.setItem("tl_theme",next);
  applyTheme(next);
  renderNav();
}
applyTheme(getTheme());

async function refreshMe(){try{me=await api("/me")}catch{me=null}renderNav()}
function renderNav(){
  const themeBtn=`<button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark mode">${getTheme()==="dark"?ICONS.sun:ICONS.moon}</button>`;
  nav.innerHTML=(me
    ?`<button onclick="go('/admin')">Dashboard</button><button onclick="go('/write')">Write</button><button class="primary" onclick="logout()">Sign out</button>`
    :`<button class="primary" onclick="go('/login')">Sign in</button>`)+themeBtn;
}
async function logout(){try{await api("/logout",{method:"POST"})}catch{} me=null;renderNav();go("/")}


function errorBlock(msg){
  return `<div class="error">${ICONS.warn}<span>${esc(msg)}</span></div>`;
}

function skeletonCards(n=4){
  return `<div class="skeleton">${Array.from({length:n}).map(()=>`
    <div class="skel-card">
      <div class="skel-line meta"></div>
      <div class="skel-line title"></div>
      <div class="skel-line excerpt"></div>
    </div>`).join("")}</div>`;
}

function newsletterBox(){
  return `<div class="newsletter-box">
    <div class="copy"><h4>Get new posts by email</h4><p>No spam, just new write-ups when they go up.</p></div>
    <form class="newsletter-form" id="subForm" onsubmit="event.preventDefault();subscribe()">
      <input id="subEmail" type="text" placeholder="you@example.com" autocomplete="email"/>
      <button type="submit" id="subBtn">Subscribe</button>
    </form>
  </div>`;
}
async function subscribe(){
  const input=document.getElementById("subEmail"),btn=document.getElementById("subBtn");
  const email=input.value.trim();
  if(!email){showToast("Enter an email address",true);return}
  btn.disabled=true;const original=btn.textContent;btn.textContent="…";
  try{
    await api("/subscribe",{method:"POST",body:JSON.stringify({email})});
    input.value="";
    showToast("Subscribed — thanks!");
  }catch(e){
    showToast(e.error||"Could not subscribe",true);
  }finally{
    btn.disabled=false;btn.textContent=original;
  }
}

async function viewList(searchTerm){
  if(currentController)currentController.abort("navigated-away");
  const ctrl=currentController=new AbortController();
  app.innerHTML=`
    <div class="search-row">
      <span class="search-icon">${ICONS.search}</span>
      <input id="q" type="text" placeholder="search posts…" value="${searchTerm?esc(searchTerm):""}" autocomplete="off"/>
      <span class="search-spinner" id="searchSpinner">${ICONS.spinner}</span>
    </div>
    <div id="tagcloud" class="tagcloud"></div>
    <div id="list">${skeletonCards()}</div>
    ${searchTerm?"":newsletterBox()}`;
  const input=document.getElementById("q"),spinner=document.getElementById("searchSpinner");
  let timer;
  input.focus();
  input.setSelectionRange(input.value.length,input.value.length);
  input.oninput=()=>{
    clearTimeout(timer);
    spinner.classList.add("show");
    timer=setTimeout(()=>{const v=input.value.trim();go(v?"/?q="+encodeURIComponent(v):"/")},320);
  };
  if(!searchTerm){
    try{
      const tags=await api("/tags",{},ctrl.signal);
      const tc=document.getElementById("tagcloud");
      if(tc)tc.innerHTML=tags.map(t=>`<button onclick="go('/tag/'+encodeURIComponent('${esc(t.tag)}'))">#${esc(t.tag)} ${t.count}</button>`).join("");
    }catch{}
  }
  const list=document.getElementById("list");
  try{
    const posts=searchTerm?await api("/search?q="+encodeURIComponent(searchTerm),{},ctrl.signal):await api("/posts",{},ctrl.signal);
    spinner.classList.remove("show");
    if(!list)return;
    renderCards(list,posts,searchTerm
      ?`<div class="empty-icon">⌕</div>nothing matched "${esc(searchTerm)}"<div class="empty-detail">try a different word, or <a href="#" onclick="event.preventDefault();go('/')" style="color:var(--accent)">clear the search</a></div>`
      :`<div class="empty-icon">✎</div>no posts yet`);
  }catch(e){
    spinner.classList.remove("show");
    if(e.error==="cancelled"||!list)return;
    list.innerHTML=`<div class="empty">${errorBlock(e.error||"Could not load posts.")}<button class="btn ghost small" onclick="viewList(${searchTerm?`'${searchTerm.replace(/'/g,"\\'")}'`:""})">Try again</button></div>`;
  }
}
function renderCards(el,posts,emptyMsg){
  if(!posts.length){el.innerHTML=`<div class="empty">${emptyMsg}</div>`;return}
  el.innerHTML=posts.map(p=>`<div class="post-card" onclick="go('/p/${p.slug}')"><div class="post-meta"><span>${fmtDate(p.publishAt||p.createdAt)}</span>${p.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join("")}<span class="dot-sep">${p.readingTime} min read</span><span>${p.views} views</span></div><div class="post-title">${esc(p.title)}</div><div class="post-excerpt">${esc(p.excerpt)}</div></div>`).join("");
}

async function viewTag(tag){
  if(currentController)currentController.abort("navigated-away");
  const ctrl=currentController=new AbortController();
  app.innerHTML=`<button class="back-link" onclick="go('/')">${ICONS.back} all posts</button><h2 style="font-family:Fraunces;font-weight:600;font-size:28px;margin-bottom:26px">#${esc(tag)}</h2><div id="list">${skeletonCards(3)}</div>`;
  try{
    const posts=await api("/tags/"+encodeURIComponent(tag),{},ctrl.signal);
    const list=document.getElementById("list");
    if(list)renderCards(list,posts,`<div class="empty-icon">#</div>no posts with this tag`);
  }catch(e){
    if(e.error==="cancelled")return;
    const list=document.getElementById("list");
    if(list)list.innerHTML=`<div class="empty">${errorBlock(e.error||"Could not load this tag.")}<button class="btn ghost small" onclick="viewTag('${tag.replace(/'/g,"\\'")}')">Try again</button></div>`;
  }
}

// Extract h2/h3 headings from rendered HTML to build a table of contents.
// Mutates nothing — just reads the headings already in the DOM after the
// post body is inserted, and injects matching ids if marked.js didn't.
function buildToc(bodyEl){
  const headings=bodyEl.querySelectorAll("h2, h3");
  if(headings.length<3)return ""; // not worth a TOC for a short post
  const items=[...headings].map((h,i)=>{
    if(!h.id)h.id=`sec-${i}-${h.textContent.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").slice(0,40)}`;
    const lvl=h.tagName==="H3"?" lvl3":"";
    return `<li class="${lvl.trim()}"><a href="#${h.id}">${esc(h.textContent)}</a></li>`;
  }).join("");
  return `<details class="toc" open><summary>Contents</summary><ol>${items}</ol></details>`;
}

function shareRow(post,url){
  const text=encodeURIComponent(post.title);
  const link=encodeURIComponent(url);
  return `<div class="share-row">
    <span class="lbl">Share</span>
    <a class="share-btn" href="https://twitter.com/intent/tweet?text=${text}&url=${link}" target="_blank" rel="noopener" title="Share on X">${ICONS.twitter}</a>
    <button class="share-btn" onclick="copyPostLink('${url.replace(/'/g,"\\'")}')" title="Copy link">${ICONS.link}</button>
  </div>`;
}
function copyPostLink(url){
  navigator.clipboard?.writeText(url).then(()=>showToast("Link copied")).catch(()=>showToast("Could not copy link",true));
}

const REACTION_EMOJI=["👍","❤️","🔥","😮","😂","🤔"];
function reactionsRow(slug,reactions,mine){
  return `<div class="reactions-row" id="reactions" data-slug="${slug}">${REACTION_EMOJI.map(e=>{
    const count=reactions[e]||0;
    const active=mine.includes(e)?" active":"";
    return `<button class="reaction-btn${active}" data-emoji="${e}" onclick="react('${slug}','${e}')">`+
      `<span class="emoji">${e}</span>`+
      `<span class="count"${count>0?"":' style="display:none"'}>${count}</span></button>`;
  }).join("")}</div>`;
}
// Update one reaction button in place (no full re-render) so the click
// animation can play. Plays a pop + floating emoji + ring burst when turning a
// reaction ON, Facebook-style.
async function react(slug,emoji){
  const row=document.getElementById("reactions");
  const btn=row?.querySelector(`.reaction-btn[data-emoji="${CSS.escape(emoji)}"]`);
  if(!btn)return;
  try{
    const r=await api("/posts/"+slug+"/react",{method:"POST",body:JSON.stringify({emoji})});
    // sync active state + count for this button from the server's fresh counts
    btn.classList.toggle("active",r.added);
    const countEl=btn.querySelector(".count");
    const n=r.counts[emoji]||0;
    countEl.textContent=n;
    countEl.style.display=n>0?"":"none";
    // also refresh sibling counts in case they changed (rare, but cheap)
    REACTION_EMOJI.forEach(e=>{
      if(e===emoji)return;
      const b=row.querySelector(`.reaction-btn[data-emoji="${CSS.escape(e)}"] .count`);
      if(b){const c=r.counts[e]||0;b.textContent=c;b.style.display=c>0?"":"none";}
    });
    // animation: pop always; float + ring only when activating
    btn.classList.remove("pop");void btn.offsetWidth;btn.classList.add("pop");
    if(r.added)spawnReactionBurst(btn,emoji);
  }catch(e){showToast(e.error||"Could not react",true)}
}
function spawnReactionBurst(btn,emoji){
  if(window.matchMedia?.("(prefers-reduced-motion: reduce)").matches)return;
  const float=document.createElement("span");
  float.className="react-float";float.textContent=emoji;
  const ring=document.createElement("span");ring.className="react-ring";
  btn.appendChild(ring);btn.appendChild(float);
  setTimeout(()=>{float.remove();ring.remove()},950);
}

function ratingStars(value,max=5){
  let out="";
  for(let i=1;i<=max;i++)out+=`<span class="star${i<=Math.round(value)?" filled":""}">${i<=Math.round(value)?ICONS.starFull:ICONS.starEmpty}</span>`;
  return out;
}
function ratingInput(){
  return `<div class="rating-input" id="ratingInput" data-value="0">
    ${[5,4,3,2,1].map(n=>`<span class="star" data-n="${n}" onclick="setRating(${n})">${ICONS.starEmpty}</span>`).join("")}
  </div>`;
}
function setRating(n){
  const el=document.getElementById("ratingInput");
  el.dataset.value=n;
  el.querySelectorAll(".star").forEach(s=>{
    const filled=Number(s.dataset.n)<=n;
    s.classList.toggle("filled",filled);
    s.textContent=filled?ICONS.starFull:ICONS.starEmpty;
  });
}

// Total comment count including nested replies, for the header badge.
function countComments(comments){
  return comments.reduce((n,c)=>n+1+(c.replies?countComments(c.replies):0),0);
}
// Render a single comment node (and its replies recursively). `mine` = the
// visitor owns it (has the edit token); `admin` = logged-in author viewing.
function commentNode(slug,c,{admin}){
  const mine=!!tokenFor(c.id);
  const canEdit=admin||mine;
  const canDelete=admin||mine;
  const canReply=admin && !c.isAdmin; // author replies to readers, not to self
  const stars=c.rating?`<span class="rating-stars">${ratingStars(c.rating)}</span>`:"";
  const badge=c.isAdmin?`<span class="comment-badge">Author</span>`:"";
  const edited=c.updatedAt&&c.updatedAt>c.createdAt+1500?`<span class="comment-edited">· edited</span>`:"";
  const actions=[];
  if(canReply)actions.push(`<button onclick="openReply('${slug}',${c.id})">Reply</button>`);
  if(canEdit)actions.push(`<button onclick="openEdit(${c.id})">Edit</button>`);
  if(canDelete)actions.push(`<button class="danger" onclick="deleteComment('${slug}',${c.id})">Delete</button>`);
  const repliesHtml=(c.replies&&c.replies.length)
    ?`<div class="comment-replies">${c.replies.map(r=>commentNode(slug,r,{admin})).join("")}</div>`:"";
  return `<div class="comment-item${c.isAdmin?" is-admin":""}" id="comment-${c.id}" data-id="${c.id}">
    <div class="comment-head">
      <div class="comment-avatar">${esc(c.author[0]?.toUpperCase()||"?")}</div>
      <span class="comment-author">${esc(c.author)}</span>
      ${badge}${stars}
      <span class="comment-date" title="${esc(fmtDateTime(c.createdAt))}">${timeAgo(c.createdAt)}</span>
      ${edited}
    </div>
    <div class="comment-body" id="comment-body-${c.id}">${esc(c.body)}</div>
    ${actions.length?`<div class="comment-actions">${actions.join("")}</div>`:""}
    <div id="reply-slot-${c.id}"></div>
    ${repliesHtml}
  </div>`;
}
function commentsSection(slug,comments,rating){
  const total=countComments(comments);
  const list=comments.length
    ?comments.map(c=>commentNode(slug,c,{admin:!!me})).join("")
    :`<div class="no-comments">No comments yet — be the first to share your thoughts.</div>`;

  const ratingHeader=rating.count>0
    ?`<div class="rating-display"><span class="rating-stars">${ratingStars(rating.average)}</span><span class="mono" style="font-size:12px;color:var(--faint)">${rating.average} from ${rating.count} rating${rating.count===1?"":"s"}</span></div>`
    :"";

  return `<div class="comments-section">
    <h3>Comments <span class="count-badge">${total}</span></h3>
    ${ratingHeader}
    <div class="comment-form">
      <div id="commentErr"></div>
      <label>Your rating (optional)</label>
      ${ratingInput()}
      <div class="row2" style="margin-top:16px">
        <div><label>Name</label><input id="cAuthor" type="text" placeholder="Your name" style="margin-bottom:0"/></div>
        <div><label>Email (optional, never shown)</label><input id="cEmail" type="text" placeholder="you@example.com" style="margin-bottom:0"/></div>
      </div>
      <label style="margin-top:16px">Comment</label>
      <textarea id="cBody" placeholder="What did you think?"></textarea>
      <button class="btn" id="commentBtn" onclick="submitComment('${slug}')">Post comment</button>
    </div>
    <div id="commentsList">${list}</div>
  </div>`;
}
function bumpCommentCount(delta){
  const b=document.querySelector(".comments-section h3 .count-badge");
  if(b)b.textContent=Math.max(0,Number(b.textContent)+delta);
}
async function submitComment(slug){
  const err=document.getElementById("commentErr");err.innerHTML="";
  const author=document.getElementById("cAuthor").value.trim();
  const email=document.getElementById("cEmail").value.trim();
  const body=document.getElementById("cBody").value.trim();
  const rating=Number(document.getElementById("ratingInput").dataset.value)||null;
  if(!author||!body){err.innerHTML=errorBlock("Name and comment can't be empty.");return}
  const btn=document.getElementById("commentBtn");
  btn.disabled=true;const original=btn.innerHTML;btn.innerHTML=`<span class="spin"></span> Posting…`;
  try{
    const c=await api("/posts/"+slug+"/comments",{method:"POST",body:JSON.stringify({author,email,body,rating})});
    if(c.editToken)saveCommentToken(c.id,c.editToken);
    const list=document.getElementById("commentsList");
    const noComments=list.querySelector(".no-comments");
    if(noComments)noComments.remove();
    list.insertAdjacentHTML("beforeend",commentNode(slug,{...c,replies:[]},{admin:!!me}));
    bumpCommentCount(1);
    document.getElementById("cAuthor").value="";
    document.getElementById("cEmail").value="";
    document.getElementById("cBody").value="";
    setRating(0);
    showToast("Comment posted");
  }catch(e){
    err.innerHTML=errorBlock(e.error||"Could not post your comment.");
  }finally{
    btn.disabled=false;btn.innerHTML=original;
  }
}

async function deleteComment(slug,id){
  if(!confirm("Delete this comment?"))return;
  try{
    const token=tokenFor(id);
    await api("/comments/"+id,{method:"DELETE",body:JSON.stringify({token})});
    const el=document.getElementById("comment-"+id);
    // count this node + any replies that vanish with it
    const removed=1+(el.querySelectorAll(".comment-item").length);
    el?.remove();
    dropCommentToken(id);
    bumpCommentCount(-removed);
    const listEl=document.getElementById("commentsList");
    if(listEl&&!listEl.querySelector(".comment-item")){
      listEl.innerHTML=`<div class="no-comments">No comments yet — be the first to share your thoughts.</div>`;
    }
    showToast("Comment deleted");
  }catch(e){showToast(e.error||"Could not delete comment",true)}
}

// Reading-progress bar: how far through the post's body the reader has
// scrolled, 0 at the top of the body to 100 at its end. Bound once per post
// view and torn down implicitly when the page navigates (route() rewrites
// app.innerHTML, which detaches the old listener target along with it —
// but the window-level listener itself needs explicit cleanup).
let progressHandler=null;
function bindProgressBar(bodyEl){
  const bar=document.getElementById("progressBar");
  if(progressHandler)window.removeEventListener("scroll",progressHandler);
  progressHandler=()=>{
    const rect=bodyEl.getBoundingClientRect();
    const total=rect.height-window.innerHeight*0.5;
    const passed=Math.min(Math.max(-rect.top,0),Math.max(total,1));
    bar.style.width=`${Math.min(100,(passed/Math.max(total,1))*100)}%`;
  };
  window.addEventListener("scroll",progressHandler,{passive:true});
  progressHandler();
}

// Back-to-top: appears once the reader has scrolled past one viewport.
let topHandler=null;
function bindBackToTop(){
  const btn=document.getElementById("toTop");
  if(topHandler)window.removeEventListener("scroll",topHandler);
  topHandler=()=>{btn.classList.toggle("show",window.scrollY>window.innerHeight*0.8)};
  window.addEventListener("scroll",topHandler,{passive:true});
  topHandler();
}
document.getElementById("toTop").addEventListener("click",()=>{
  window.scrollTo({top:0,behavior:"smooth"});
});

// Image lightbox: any image inside a rendered post opens fullscreen on click.
(function initLightbox(){
  const lb=document.getElementById("lightbox"),img=document.getElementById("lightboxImg");
  const close=()=>{lb.classList.remove("open");lb.setAttribute("aria-hidden","true");img.src=""};
  document.getElementById("lightboxClose").innerHTML=ICONS.close;
  document.getElementById("lightboxClose").addEventListener("click",close);
  lb.addEventListener("click",(e)=>{if(e.target===lb)close()});
  document.addEventListener("keydown",(e)=>{if(e.key==="Escape"&&lb.classList.contains("open"))close()});
  window.__openLightbox=(src,alt)=>{img.src=src;img.alt=alt||"";lb.classList.add("open");lb.setAttribute("aria-hidden","false")};
})();

// Post-render enhancements applied to the rendered article body:
//  1. wrap every <pre><code> in a header bar with language label + copy button
//  2. run highlight.js over code blocks (monochrome theme via CSS)
//  3. make images open in the lightbox
// Called once after the post HTML is inserted into the DOM.
function enhancePostBody(bodyEl){
  // --- code blocks ---
  bodyEl.querySelectorAll("pre > code").forEach((code)=>{
    const pre=code.parentElement;
    if(pre.parentElement.classList.contains("code-wrap"))return; // already done
    // detect language from the "language-xxx" class marked.js adds
    let lang="";
    code.classList.forEach(c=>{if(c.startsWith("language-"))lang=c.slice(9)});
    // syntax highlight if the library loaded
    try{if(window.hljs){lang?hljs.highlightElement(code):hljs.highlightElement(code)}}catch{}
    const wrap=document.createElement("div");
    wrap.className="code-wrap has-head";
    const head=document.createElement("div");
    head.className="code-head";
    head.innerHTML=`<span class="code-lang">${esc(lang||"code")}</span>
      <button class="code-copy" type="button">${ICONS.copy}<span>Copy</span></button>`;
    pre.replaceWith(wrap);
    wrap.appendChild(head);
    wrap.appendChild(pre);
    const btn=head.querySelector(".code-copy");
    btn.addEventListener("click",()=>{
      navigator.clipboard?.writeText(code.textContent).then(()=>{
        btn.classList.add("copied");
        btn.innerHTML=`${ICONS.check}<span>Copied</span>`;
        setTimeout(()=>{btn.classList.remove("copied");btn.innerHTML=`${ICONS.copy}<span>Copy</span>`},1600);
      }).catch(()=>showToast("Could not copy",true));
    });
  });
  // --- images -> lightbox ---
  bodyEl.querySelectorAll("img").forEach((im)=>{
    im.addEventListener("click",()=>window.__openLightbox(im.src,im.alt));
  });
  // --- callout icons (server emits data-icon, we slot the svg in) ---
  const CALLOUT_ICON={note:ICONS.info,info:ICONS.info,tip:ICONS.tip,warn:ICONS.warn,warning:ICONS.warn};
  bodyEl.querySelectorAll(".callout-head[data-icon]").forEach((h)=>{
    const ic=CALLOUT_ICON[h.dataset.icon]||ICONS.info;
    h.insertAdjacentHTML("afterbegin",ic);
  });
}

// Dashboard list state: the full set from the server, the active status
// filter, the text query, and the set of selected post ids for bulk actions.
let adminPosts=[];
let adminFilter="all";
let adminQuery="";
let adminSelected=new Set();

function renderAdminList(posts){
  if(posts)adminPosts=posts;
  const el=document.getElementById("adminlist");
  if(!adminPosts.length){el.innerHTML=`<div class="empty"><div class="empty-icon">✎</div>no posts yet<button class="btn small" onclick="go('/write')">Write your first post</button></div>`;return}
  const q=adminQuery.toLowerCase();
  const shown=adminPosts.filter(p=>
    (adminFilter==="all"||p.status===adminFilter)&&
    (!q||p.title.toLowerCase().includes(q)||p.slug.toLowerCase().includes(q))
  );
  // prune selections that are no longer visible
  adminSelected.forEach(id=>{if(!shown.some(p=>p.id===id))adminSelected.delete(id)});
  if(!shown.length){
    el.innerHTML=`<div class="empty" style="padding:40px 0"><div class="empty-icon">⌕</div>no posts match this filter</div>`;
    updateBulkBar();return;
  }
  el.innerHTML=shown.map(p=>{
    let sched=p.status==="scheduled"&&p.publishAt?` · publishes ${fmtDateTime(p.publishAt)}`:"";
    const checked=adminSelected.has(p.id)?"checked":"";
    return `<div class="admin-post-row${adminSelected.has(p.id)?" selected":""}" data-id="${p.id}">
      <span class="row-check"><input type="checkbox" ${checked} onchange="toggleSelect(${p.id},this.checked)" aria-label="Select post"/></span>
      <div style="flex:1"><div class="t">${esc(p.title)} <span class="badge ${p.status}">${p.status}</span></div><div class="s">/${esc(p.slug)} · ${p.views} views${sched}</div></div>
      <div class="btn-group"><button class="btn ghost small" onclick="go('/edit/${p.id}')">Edit</button><button class="btn ghost small" onclick="go('/p/${p.slug}')">View</button><button class="btn danger small" onclick="delPost(${p.id})">Delete</button></div>
    </div>`;
  }).join("");
  updateBulkBar();
}
function setAdminFilter(f){
  adminFilter=f;
  document.querySelectorAll("#statusSeg button").forEach(b=>b.classList.toggle("on",b.dataset.f===f));
  renderAdminList();
}
function toggleSelect(id,on){
  if(on)adminSelected.add(id);else adminSelected.delete(id);
  const row=document.querySelector(`.admin-post-row[data-id="${id}"]`);
  if(row)row.classList.toggle("selected",on);
  updateBulkBar();
}
function clearSelection(){adminSelected.clear();renderAdminList()}
function updateBulkBar(){
  const bar=document.getElementById("bulkBar");if(!bar)return;
  bar.classList.toggle("show",adminSelected.size>0);
  const c=document.getElementById("selCount");
  if(c)c.textContent=`${adminSelected.size} selected`;
}
async function bulkAction(action){
  const ids=[...adminSelected];
  if(!ids.length)return;
  const verb=action==="delete"?"Delete":action==="publish"?"Publish":"Move to draft";
  if(action==="delete"&&!confirm(`Delete ${ids.length} post${ids.length===1?"":"s"} for good?`))return;
  try{
    const r=await api("/admin/posts/bulk",{method:"POST",body:JSON.stringify({ids,action})});
    showToast(`${verb}: ${r.affected} post${r.affected===1?"":"s"}`);
    adminSelected.clear();
    viewAdmin();
  }catch(e){showToast(e.error||"Bulk action failed",true)}
}
async function delPost(id){
  if(!confirm("Delete this post for good?"))return;
  try{await api("/admin/posts/"+id,{method:"DELETE"});showToast("Post deleted");viewAdmin()}
  catch(e){showToast(e.error||"Could not delete post",true)}
}

// Apply a Markdown formatting action to a textarea around the current
// selection (or insert a placeholder if nothing is selected). Wraps inline
// styles, prefixes block styles line-by-line, and re-selects sensibly so the
// caret lands where you'd expect. Shared by the toolbar and Ctrl/Cmd shortcuts.
function applyFormat(ta,kind,...after){
  const s=ta.selectionStart,e=ta.selectionEnd;
  const sel=ta.value.slice(s,e);
  const before=ta.value.slice(0,s),rest=ta.value.slice(e);
  const wrap=(pre,post,ph)=>{
    const inner=sel||ph;
    ta.value=before+pre+inner+post+rest;
    const start=s+pre.length;
    ta.setSelectionRange(start,start+inner.length);
  };
  const linePrefix=(pre,ph)=>{
    const inner=sel||ph;
    const out=inner.split("\n").map(l=>pre+l).join("\n");
    ta.value=before+out+rest;
    ta.setSelectionRange(s,s+out.length);
  };
  switch(kind){
    case "bold":   wrap("**","**","bold text");break;
    case "italic": wrap("*","*","italic text");break;
    case "code":   wrap("`","`","code");break;
    case "h2":     linePrefix("## ","Heading");break;
    case "h3":     linePrefix("### ","Subheading");break;
    case "quote":  linePrefix("> ","Quote");break;
    case "ul":     linePrefix("- ","List item");break;
    case "codeblock":{
      const inner=sel||"code here";
      const nl=before&&!before.endsWith("\n")?"\n":"";
      ta.value=before+nl+"```\n"+inner+"\n```\n"+rest;
      const start=s+nl.length+4;
      ta.setSelectionRange(start,start+inner.length);
      break;
    }
    case "link":{
      const text=sel||"link text";
      ta.value=before+"["+text+"](url)"+rest;
      const urlStart=s+1+text.length+2;
      ta.setSelectionRange(urlStart,urlStart+3); // select "url"
      break;
    }
  }
  ta.focus();
  after.forEach(fn=>{try{fn()}catch{}});
}

        <button type="button" class="tb" title="Subheading" onclick="fmt('h3')">H3</button>
